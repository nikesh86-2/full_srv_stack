services:
  home-assistant:
    container_name: home-assistant
    image: ghcr.io/home-assistant/home-assistant:latest
    restart: unless-stopped
    privileged: true
    # Using host mode to allow for mDNS/UPnP discovery of local IoT devices
    network_mode: host
    cap_add:
      - NET_ADMIN # Required for network management
      - NET_RAW   # Required for certain discovery protocols
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro
    environment:
      - TZ=${TZ}
      - PUID=${PUID}
      - PGID=${PGID}

  music-assistant:
    container_name: music-assistant
    image: ghcr.io/music-assistant/server:latest
    user: "${PUID}:${PGID}"
    # Host mode required for casting (AirPlay/Google Cast) across subnets
    network_mode: host
    environment:
      - TZ=${TZ}
    volumes:
      - ./ma-config/data:/data
      - ${MUSIC_PATH}:/music:ro # NAS integration via NFS/SMB mount, using .env variable
    restart: unless-stopped
    depends_on:
      - home-assistant

  whisper:
    container_name: whisper
    image: rhasspy/wyoming-whisper
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./whisper-data:/data
    command: --model tiny-int8 --language en

  piper:
    container_name: piper
    image: rhasspy/wyoming-piper
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./piper-data:/data
    command: --voice en_GB-alba-medium
