services:
  # --------------------------------------------------
  # Nginx Proxy Manager
  # Reverse proxy + SSL management UI
  # --------------------------------------------------
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped

    # Expose web ports
    ports:
      - "${NPM_HTTP_PORT}:80"      # HTTP
      - "${NPM_ADMIN_PORT}:81"     # Admin UI
      - "${NPM_HTTPS_PORT}:443"    # HTTPS

    volumes:
      # Configuration database and settings
      - ${NPM_DATA_PATH}:/data

      # Let's Encrypt certificates
      - ${NPM_LETSENCRYPT_PATH}:/etc/letsencrypt
